<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Homeless Launcher</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f0f0f;
            font-family: Arial;
            color: white;
        }

        .box {
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            border-radius: 15px;
            background: #444;
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: #666;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Homeless Launcher</h1>
    <a class="btn" href="#">Pobierz</a>
</div>

</body>
</html>
